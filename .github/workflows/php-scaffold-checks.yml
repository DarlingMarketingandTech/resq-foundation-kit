name: PHP Scaffold Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  php-syntax:
    runs-on: ubuntu-latest
    name: PHP Syntax Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: none

      - name: Lint PHP files in wp-content
        run: |
          find wp-content -name "*.php" -type f -exec php -l {} \; | grep -v "No syntax errors detected"
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -eq 0 ]; then
            echo "✓ All PHP files passed syntax check"
          fi
          exit $exit_code
