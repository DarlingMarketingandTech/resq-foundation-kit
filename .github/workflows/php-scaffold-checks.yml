name: PHP Scaffold Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  php-syntax:
    runs-on: ubuntu-latest
    name: PHP Syntax Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: none

      - name: Lint PHP files in wp-content
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(wp-content/**/*.php)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No PHP files found under wp-content"
            exit 0
          fi
          for file in "${files[@]}"; do
            php -l "$file"
          done
          echo "All PHP files passed syntax check"
